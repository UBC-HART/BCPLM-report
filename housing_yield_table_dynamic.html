<!-- Live housing-yield table for an Experience Builder Embed widget.
     Host on GitHub Pages and embed by URL (same pattern as bcpl-report.html).
     Values are summed live from the hosted layer on load, so they stay correct
     whenever the layer is overwritten by the pipeline — no manual editing.
     NOTE: this sums the WHOLE layer; it does not respond to in-app Filter widgets
     (custom widgets aren't supported in ArcGIS Online's hosted Experience Builder). -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap');

  .hy-wrap {
    font-family: 'Open Sans', sans-serif;
    color: #2b2b2b;
    background: transparent;
    padding: 4px;
  }
  .hy-wrap h2 {
    font-family: 'Bahnschrift', 'Open Sans', sans-serif !important;
    font-weight: 600;
    font-size: 16px;
    margin: 0 0 10px 0;
    color: #1b3a5b;
  }
  table.hy {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    font-variant-numeric: tabular-nums; /* keeps digits aligned */
  }
  table.hy th, table.hy td { padding: 8px 12px; }
  table.hy thead th {
    text-align: right;
    font-weight: 600;
    color: #1b3a5b;
    border-bottom: 2px solid #1b3a5b;
    white-space: nowrap;
  }
  table.hy thead th:first-child { text-align: left; }
  table.hy tbody td {
    text-align: right;
    border-bottom: 1px solid #e3e6ea;
  }
  table.hy tbody td:first-child {
    text-align: left;
    font-weight: 600;
    color: #333;
  }
  table.hy tbody tr:nth-child(even) td { background: #f7f9fb; }
  table.hy tfoot td {
    text-align: right;
    font-weight: 700;
    color: #1b3a5b;
    border-top: 2px solid #1b3a5b;
    background: #eef3f8;
  }
  table.hy tfoot td:first-child { text-align: left; }
  .hy-note { font-size: 11px; color: #777; margin-top: 8px; }
  .hy-err  { font-size: 12px; color: #b00020; margin-top: 8px; }
  td.loading { color: #999; font-style: italic; }
</style>

<div class="hy-wrap">
  <h2>Total Housing Yield by Density Scenario</h2>
  <table class="hy">
    <thead>
      <tr>
        <th>Density category</th>
        <th id="h0"></th><th id="h1"></th><th id="h2"></th>
      </tr>
    </thead>
    <tbody id="hy-body"></tbody>
    <tfoot><tr id="hy-foot"></tr></tfoot>
  </table>
  <p class="hy-note">Scenarios are alternatives, not cumulative &mdash; totals shown per scenario only.</p>
  <p class="hy-err" id="hy-err" style="display:none;"></p>
</div>

<script>
// ====================== CONFIG (confirmed against the live layer) ======================
const SERVICE_URL = "https://services2.arcgis.com/NlsizNmbMFiinWw4/arcgis/rest/services/BCPLM_Apr13/FeatureServer/20";

const COLUMNS = [
  { label: "Current density",               catField: "Existing_density_Cat", yieldField: "Yield_Existing" },
  { label: "Median neighbourhood density",  catField: "Median_density_Cat",   yieldField: "Yield_Median"   },
  { label: "Highest neighbourhood density", catField: "Max_density_Cat",      yieldField: "Yield_Max"      },
];

// `value` must match the stored category string EXACTLY (case-sensitive).
// If a cell shows "—", check the real values on the layer's query page and adjust.
const ROWS = [
  { value: "Low",       label: "<25 UPA — gentle density" },
  { value: "Medium",    label: "25–140 UPA — low-rise (3–6 storey)" },
  { value: "High",      label: "140–200 UPA — high-rise" },
  { value: "Very High", label: ">200 UPA — dense high-rise" },
];

const TOKEN = ""; // layer is public; leave blank.
// ======================================================================================

const fmt = v => (v == null ? "—" : Math.round(v).toLocaleString("en-CA"));

async function fetchColumn(col) {
  const params = new URLSearchParams({
    where: "1=1",
    groupByFieldsForStatistics: col.catField,
    outStatistics: JSON.stringify([{
      statisticType: "sum",
      onStatisticField: col.yieldField,
      outStatisticFieldName: "yld"
    }]),
    returnGeometry: "false",
    f: "json"
  });
  if (TOKEN) params.set("token", TOKEN);
  const res = await fetch(`${SERVICE_URL}/query?${params.toString()}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || "Query error");
  const map = {};
  (data.features || []).forEach(f => { map[f.attributes[col.catField]] = f.attributes.yld; });
  return map;
}

function renderScaffold() {
  COLUMNS.forEach((c, i) => { document.getElementById("h" + i).textContent = c.label; });
  document.getElementById("hy-body").innerHTML = ROWS.map(r =>
    `<tr><td>${r.label}</td>` + COLUMNS.map(() => `<td class="loading">…</td>`).join("") + `</tr>`
  ).join("");
}

function renderData(colMaps) {
  document.getElementById("hy-body").innerHTML = ROWS.map(r =>
    `<tr><td>${r.label}</td>` + colMaps.map(m => `<td>${fmt(m[r.value])}</td>`).join("") + `</tr>`
  ).join("");
  const totals = colMaps.map(m => ROWS.reduce((s, r) => s + (m[r.value] || 0), 0));
  document.getElementById("hy-foot").innerHTML =
    `<td>Total units</td>` + totals.map(t => `<td>${fmt(t)}</td>`).join("");
}

(async () => {
  renderScaffold();
  try {
    renderData(await Promise.all(COLUMNS.map(fetchColumn)));
  } catch (e) {
    const err = document.getElementById("hy-err");
    err.style.display = "block";
    err.textContent = "Could not load data: " + e.message;
  }
})();
</script>
